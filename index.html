<title>日程打卡</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg1:#0f0c29;--bg2:#302b63;--bg3:#24243e;
  --card:rgba(255,255,255,0.04);--card-hover:rgba(255,255,255,0.07);
  --text:#e0e0e0;--text-dim:rgba(255,255,255,0.4);--text-faint:rgba(255,255,255,0.15);
  --green:#43e97b;--green2:#38f9d7;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
#app{height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ===== HEADER ===== */
.header{
  padding:calc(var(--safe-top) + 12px) 20px 0;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.header .title-area{flex:1;text-align:center}
.header h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:1px}
.header .week{font-size:12px;color:var(--text-dim);margin-top:2px}
.header-btn{
  width:38px;height:38px;border-radius:50%;border:none;
  background:var(--card);color:var(--text);font-size:18px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background 0.2s;flex-shrink:0;
}
.header-btn:active{background:var(--card-hover)}

/* ===== DATE STRIP ===== */
.date-strip{
  display:flex;gap:6px;padding:16px 20px 8px;overflow-x:auto;flex-shrink:0;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.date-strip::-webkit-scrollbar{display:none}
.date-item{
  min-width:48px;padding:8px 6px;border-radius:14px;text-align:center;
  cursor:pointer;transition:all 0.25s;flex-shrink:0;
  background:var(--card);
}
.date-item:active{transform:scale(0.95)}
.date-item .dow{font-size:10px;color:var(--text-dim);font-weight:500;letter-spacing:1px}
.date-item .day{font-size:18px;font-weight:700;color:rgba(255,255,255,0.6);margin:2px 0}
.date-item .dot-row{height:6px;display:flex;justify-content:center;align-items:center}
.date-item .done-dot{width:5px;height:5px;border-radius:50%;background:var(--green);opacity:0}
.date-item.active{background:rgba(67,233,123,0.15)}
.date-item.active .day{color:#fff}
.date-item.active .dow{color:var(--green)}
.date-item.has-tasks .done-dot{opacity:1}
.date-item.today .day{color:var(--green)}

/* ===== PROGRESS ===== */
.progress-section{padding:8px 24px 4px;flex-shrink:0}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:12px;color:var(--text-dim)}
.progress-label span{color:var(--green);font-weight:700;font-size:14px}
.progress-pct{font-size:12px;color:var(--text-dim);font-weight:500}
.progress-bar{width:100%;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:3px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}

/* ===== TASK LIST ===== */
.task-list{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 16px 100px;
  -webkit-overflow-scrolling:touch;
}
.category-label{
  display:flex;align-items:center;gap:8px;margin:20px 4px 10px;
}
.category-label:first-child{margin-top:8px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase}
.cat-line{flex:1;height:1px;background:rgba(255,255,255,0.06)}

/* Task Card */
.task-card{
  display:flex;align-items:stretch;margin-bottom:8px;border-radius:14px;
  background:var(--card);backdrop-filter:blur(10px);overflow:hidden;
  transition:all 0.3s;position:relative;
}
.task-card:active{transform:scale(0.98)}
.task-card.done{opacity:0.45}
.task-card.done .task-title{text-decoration:line-through;color:rgba(255,255,255,0.45)}

/* Accent bar */
.task-accent{width:3.5px;flex-shrink:0}

/* Checkbox */
.task-check{
  width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.check-ring{
  width:24px;height:24px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.check-ring svg{width:14px;height:14px;opacity:0;transform:scale(0.5);transition:all 0.25s}
.task-card.done .check-ring{border-color:var(--green);background:var(--green)}
.task-card.done .check-ring svg{opacity:1;transform:scale(1)}

/* Content */
.task-body{flex:1;padding:12px 12px 12px 0;display:flex;flex-direction:column;justify-content:center;min-width:0}
.task-title{font-size:15px;font-weight:500;color:#fff;transition:all 0.3s;line-height:1.3}
.task-time{font-size:11px;color:var(--text-dim);margin-bottom:3px;font-weight:500;letter-spacing:0.5px}
.task-desc{font-size:12px;color:var(--text-dim);margin-top:2px;line-height:1.4}
.task-emoji{
  width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:opacity 0.3s;
}
.task-card.done .task-emoji{opacity:0.3}

/* Delete overlay */
.task-delete{
  position:absolute;right:0;top:0;bottom:0;width:70px;
  background:linear-gradient(90deg,transparent,rgba(245,87,108,0.9));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;font-weight:500;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}

/* ===== FAB ===== */
.fab{
  position:fixed;bottom:calc(var(--safe-bottom) + 28px);right:24px;
  width:56px;height:56px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:var(--bg1);font-size:28px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(67,233,123,0.3);
  cursor:pointer;transition:all 0.2s;z-index:50;
}
.fab:active{transform:scale(0.9)}

/* ===== BOTTOM SHEET ===== */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.overlay.show{opacity:1;pointer-events:auto}

.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:101;
  background:linear-gradient(180deg,#1e1a3e,#16132e);
  border-radius:20px 20px 0 0;padding:0 20px calc(var(--safe-bottom) + 20px);
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  max-height:85vh;overflow-y:auto;
}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 16px}
.sheet h2{font-size:18px;font-weight:600;color:#fff;margin-bottom:18px}

/* Form */
.form-row{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text-dim);font-weight:500;letter-spacing:1px;margin-bottom:6px;display:block}
.form-input{
  width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;background:rgba(255,255,255,0.04);
  color:#fff;font-size:15px;font-family:inherit;
  outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:rgba(67,233,123,0.4)}
.form-input::placeholder{color:rgba(255,255,255,0.2)}
textarea.form-input{resize:none;min-height:60px}

.form-time-row{display:flex;gap:10px;align-items:center}
.form-time-row input{flex:1;text-align:center}
.form-time-sep{color:var(--text-dim);font-size:14px}

/* Color picker */
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;
}
.color-opt:active{transform:scale(0.9)}
.color-opt.selected{border-color:#fff;transform:scale(1.1)}

/* Emoji picker */
.emoji-picker{display:flex;gap:6px;flex-wrap:wrap}
.emoji-opt{
  width:36px;height:36px;border-radius:10px;cursor:pointer;
  background:var(--card);display:flex;align-items:center;justify-content:center;
  font-size:18px;border:2px solid transparent;transition:all 0.2s;
}
.emoji-opt:active{transform:scale(0.9)}
.emoji-opt.selected{border-color:var(--green);background:rgba(67,233,123,0.1)}

/* Buttons */
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn{
  flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;
  font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;
}
.btn:active{transform:scale(0.97)}
.btn-cancel{background:rgba(255,255,255,0.06);color:var(--text-dim)}
.btn-save{background:linear-gradient(135deg,var(--green),var(--green2));color:var(--bg1)}

/* ===== EMPTY STATE ===== */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 40px;text-align:center;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.6}
.empty-text{font-size:15px;color:var(--text-dim);line-height:1.6}
.empty-hint{font-size:12px;color:var(--text-faint);margin-top:8px}

/* ===== CELEBRATE ===== */
.celebrate-bar{
  position:fixed;top:calc(var(--safe-top) + 60px);left:20px;right:20px;
  padding:14px 20px;border-radius:14px;text-align:center;
  background:linear-gradient(135deg,rgba(67,233,123,0.2),rgba(56,249,215,0.15));
  border:1px solid rgba(67,233,123,0.2);
  font-size:15px;color:var(--green);font-weight:500;
  transform:translateY(-20px);opacity:0;transition:all 0.5s;
  pointer-events:none;z-index:40;
}
.celebrate-bar.show{transform:translateY(0);opacity:1}

/* ===== STATS SHEET ===== */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{
  padding:16px;border-radius:14px;background:var(--card);text-align:center;
}
.stat-num{font-size:28px;font-weight:900;color:#fff}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:4px;letter-spacing:1px}
.stat-num.green{color:var(--green)}

/* ===== SCROLLBAR ===== */
.task-list::-webkit-scrollbar{width:0}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.task-card{animation:fadeInUp 0.3s ease both}
.task-card:nth-child(2){animation-delay:0.03s}
.task-card:nth-child(3){animation-delay:0.06s}
.task-card:nth-child(4){animation-delay:0.09s}
.task-card:nth-child(5){animation-delay:0.12s}

@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.check-ring.just-checked{animation:pop 0.3s ease}

/* ===== COLOR THEMES ===== */
.c-warm .task-accent{background:linear-gradient(180deg,#f6d365,#fda085)}
.c-warm .task-time{color:#fda085}
.c-green .task-accent{background:linear-gradient(180deg,#a8e063,#56ab2f)}
.c-green .task-time{color:#a8e063}
.c-blue .task-accent{background:linear-gradient(180deg,#667eea,#764ba2)}
.c-blue .task-time{color:#9b8ec4}
.c-red .task-accent{background:linear-gradient(180deg,#f093fb,#f5576c)}
.c-red .task-time{color:#f093fb}
.c-teal .task-accent{background:linear-gradient(180deg,#43e97b,#38f9d7)}
.c-teal .task-time{color:#43e97b}
.c-orange .task-accent{background:linear-gradient(180deg,#fa709a,#fee140)}
.c-orange .task-time{color:#fa709a}
.c-purple .task-accent{background:linear-gradient(180deg,#a18cd1,#fbc2eb)}
.c-purple .task-time{color:#c4a8e0}
.c-night .task-accent{background:linear-gradient(180deg,#667eea,#2c3e7b)}
.c-night .task-time{color:#7b8ec8}
.c-cyan .task-accent{background:linear-gradient(180deg,#89f7fe,#66a6ff)}
.c-cyan .task-time{color:#89f7fe}
.c-peach .task-accent{background:linear-gradient(180deg,#ffecd2,#fcb69f)}
.c-peach .task-time{color:#fcb69f}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <button class="header-btn" onclick="navDate(-1)">‹</button>
    <div class="title-area">
      <h1 id="headerDate"></h1>
      <div class="week" id="headerWeek"></div>
    </div>
    <button class="header-btn" onclick="showStats()">📊</button>
  </div>

  <!-- Date Strip -->
  <div class="date-strip" id="dateStrip"></div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-info">
      <div class="progress-label">已完成 <span id="doneCount">0</span> / <span id="totalCount">0</span></div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- Task List -->
  <div class="task-list" id="taskList"></div>

  <!-- FAB -->
  <button class="fab" onclick="openAdd()">+</button>

  <!-- Celebrate -->
  <div class="celebrate-bar" id="celebrate">全部完成！今天超棒的 ✨</div>

</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- Add/Edit Sheet -->
<div class="sheet" id="taskSheet">
  <div class="sheet-handle"></div>
  <h2 id="sheetTitle">添加任务</h2>
  <div class="form-row">
    <label class="form-label">时间</label>
    <div class="form-time-row">
      <input class="form-input" type="time" id="fTimeStart">
      <span class="form-time-sep">—</span>
      <input class="form-input" type="time" id="fTimeEnd">
    </div>
  </div>
  <div class="form-row">
    <label class="form-label">标题</label>
    <input class="form-input" type="text" id="fTitle" placeholder="做什么？" maxlength="40">
  </div>
  <div class="form-row">
    <label class="form-label">描述（可选）</label>
    <textarea class="form-input" id="fDesc" placeholder="补充说明..." maxlength="100"></textarea>
  </div>
  <div class="form-row">
    <label class="form-label">分类颜色</label>
    <div class="color-picker" id="colorPicker"></div>
  </div>
  <div class="form-row">
    <label class="form-label">图标</label>
    <div class="emoji-picker" id="emojiPicker"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-cancel" onclick="closeSheet()">取消</button>
    <button class="btn btn-save" onclick="saveTask()">保存</button>
  </div>
</div>

<!-- Stats Sheet -->
<div class="sheet" id="statsSheet">
  <div class="sheet-handle"></div>
  <h2>数据统计</h2>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num green" id="statToday">0%</div><div class="stat-label">今日完成率</div></div>
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">累计任务数</div></div>
    <div class="stat-card"><div class="stat-num green" id="statDone">0</div><div class="stat-label">累计完成</div></div>
    <div class="stat-card"><div class="stat-num" id="statDays">0</div><div class="stat-label">打卡天数</div></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-save" onclick="closeStats()" style="background:var(--card);color:var(--text)">关闭</button>
  </div>
</div>

<script>
// ===== CONSTANTS =====
const COLORS = [
  {id:'warm',grad:'linear-gradient(135deg,#f6d365,#fda085)'},
  {id:'green',grad:'linear-gradient(135deg,#a8e063,#56ab2f)'},
  {id:'blue',grad:'linear-gradient(135deg,#667eea,#764ba2)'},
  {id:'red',grad:'linear-gradient(135deg,#f093fb,#f5576c)'},
  {id:'teal',grad:'linear-gradient(135deg,#43e97b,#38f9d7)'},
  {id:'orange',grad:'linear-gradient(135deg,#fa709a,#fee140)'},
  {id:'purple',grad:'linear-gradient(135deg,#a18cd1,#fbc2eb)'},
  {id:'night',grad:'linear-gradient(135deg,#667eea,#2c3e7b)'},
  {id:'cyan',grad:'linear-gradient(135deg,#89f7fe,#66a6ff)'},
  {id:'peach',grad:'linear-gradient(135deg,#ffecd2,#fcb69f)'},
];
const EMOJIS = ['☀️','🏃','📐','📊','📈','📖','💪','🍲','🥗','😴','🎮','🌙','📦','🎵','✍️','💻','🧘','🛒','📝','🎨'];
const DOW = ['日','一','二','三','四','五','六'];
const STORAGE_KEY = 'daily_planner_data';

// ===== STATE =====
let state = { currentDate: todayStr(), editingId: null };
let data = loadData();

// ===== UTILS =====
function todayStr(){ return fmtDate(new Date()) }
function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0') }
function parseDate(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]) }
function dateLabel(s){
  const d=parseDate(s), t=parseDate(todayStr());
  const diff=Math.round((d-t)/(86400000));
  if(diff===0) return '今天';
  if(diff===1) return '明天';
  if(diff===-1) return '昨天';
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}
function fullDateLabel(s){
  const d=parseDate(s);
  return d.getFullYear()+' 年 '+(d.getMonth()+1)+' 月 '+d.getDate()+' 日';
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }

// ===== STORAGE =====
function loadData(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {tasks:{}} }
  catch(e){ return {tasks:{}} }
}
function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)) }catch(e){}
}
function getTasks(date){
  return (data.tasks[date]||[]).sort((a,b)=>(a.timeStart||'').localeCompare(b.timeStart||''));
}
function setTasks(date,tasks){
  if(tasks.length===0) delete data.tasks[date];
  else data.tasks[date]=tasks;
  saveData();
}

// ===== RENDER =====
function render(){
  renderHeader();
  renderDateStrip();
  renderTasks();
  renderProgress();
}

function renderHeader(){
  const el=document.getElementById('headerDate');
  const wk=document.getElementById('headerWeek');
  el.textContent=fullDateLabel(state.currentDate);
  const d=parseDate(state.currentDate);
  wk.textContent='星期'+DOW[d.getDay()];
}

function renderDateStrip(){
  const strip=document.getElementById('dateStrip');
  const today=new Date();
  let html='';
  for(let i=-7;i<=7;i++){
    const d=new Date(today);d.setDate(d.getDate()+i);
    const ds=fmtDate(d);
    const tasks=getTasks(ds);
    const done=tasks.filter(t=>t.done).length;
    const isActive=ds===state.currentDate;
    const isToday=ds===todayStr();
    const hasTasks=tasks.length>0;
    const allDone=hasTasks&&done===tasks.length;
    html+=`<div class="date-item${isActive?' active':''}${isToday?' today':''}${hasTasks?' has-tasks':''}" onclick="goToDate('${ds}')">
      <div class="dow">${DOW[d.getDay()]}</div>
      <div class="day">${d.getDate()}</div>
      <div class="dot-row"><div class="done-dot" style="${allDone?'opacity:1':''}"></div></div>
    </div>`;
  }
  strip.innerHTML=html;
  // Scroll active into view
  setTimeout(()=>{
    const active=strip.querySelector('.active');
    if(active) active.scrollIntoView({inline:'center',behavior:'smooth'});
  },50);
}

function renderTasks(){
  const list=document.getElementById('taskList');
  const tasks=getTasks(state.currentDate);

  if(tasks.length===0){
    list.innerHTML=`<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">${state.currentDate===todayStr()?'今天还没有安排':'这天还没有安排'}</div>
      <div class="empty-hint">点右下角 + 添加任务</div>
    </div>`;
    return;
  }

  // Group by category color
  let html='';
  let lastColor='';
  const colorNames={warm:'晨间',green:'运动',blue:'学习',red:'重点',teal:'生活',orange:'活力',purple:'深度',night:'晚间',cyan:'休息',peach:'轻松'};

  tasks.forEach((task,i)=>{
    if(task.color!==lastColor){
      lastColor=task.color;
      const cn=colorNames[task.color]||'其他';
      const c=COLORS.find(x=>x.id===task.color);
      html+=`<div class="category-label">
        <div class="cat-dot" style="background:${c?c.grad:'#888'}"></div>
        <span class="cat-name" style="color:${c?'rgba(255,255,255,0.5)':'#888'}">${cn}</span>
        <div class="cat-line"></div>
      </div>`;
    }
    const timeStr=(task.timeStart||'')+(task.timeEnd?' — '+task.timeEnd:'');
    html+=`<div class="task-card c-${task.color}${task.done?' done':''}" data-id="${task.id}" onclick="toggleTask('${task.id}')">
      <div class="task-check"><div class="check-ring"><svg viewBox="0 0 24 24" fill="none" stroke="#0f0c29" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div></div>
      <div class="task-accent"></div>
      <div class="task-body">
        ${timeStr?'<div class="task-time">'+timeStr+'</div>':''}
        <div class="task-title">${esc(task.title)}</div>
        ${task.desc?'<div class="task-desc">'+esc(task.desc)+'</div>':''}
      </div>
      <div class="task-emoji">${task.emoji||''}</div>
    </div>`;
  });

  list.innerHTML=html;

  // Long press to delete
  list.querySelectorAll('.task-card').forEach(card=>{
    let timer;
    card.addEventListener('touchstart',e=>{
      timer=setTimeout(()=>{
        const id=card.dataset.id;
        if(confirm('删除这个任务？')) deleteTask(id);
      },600);
    },{passive:true});
    card.addEventListener('touchend',()=>clearTimeout(timer));
    card.addEventListener('touchmove',()=>clearTimeout(timer));
  });
}

function renderProgress(){
  const tasks=getTasks(state.currentDate);
  const total=tasks.length;
  const done=tasks.filter(t=>t.done).length;
  const pct=total>0?Math.round(done/total*100):0;

  document.getElementById('doneCount').textContent=done;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';

  const cel=document.getElementById('celebrate');
  if(total>0&&done===total) cel.classList.add('show');
  else cel.classList.remove('show');
}

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML }

// ===== ACTIONS =====
function goToDate(ds){
  state.currentDate=ds;
  render();
}

function navDate(delta){
  const d=parseDate(state.currentDate);
  d.setDate(d.getDate()+delta);
  state.currentDate=fmtDate(d);
  render();
}

function toggleTask(id){
  const tasks=getTasks(state.currentDate);
  const task=tasks.find(t=>t.id===id);
  if(!task) return;
  task.done=!task.done;
  setTasks(state.currentDate,tasks);

  // Animate
  const card=document.querySelector(`[data-id="${id}"]`);
  if(card&&task.done){
    const ring=card.querySelector('.check-ring');
    ring.classList.add('just-checked');
    setTimeout(()=>ring.classList.remove('just-checked'),300);
  }

  renderTasks();
  renderProgress();
  renderDateStrip();
}

function deleteTask(id){
  let tasks=getTasks(state.currentDate);
  tasks=tasks.filter(t=>t.id!==id);
  setTasks(state.currentDate,tasks);
  render();
}

// ===== FORM =====
function openAdd(){
  state.editingId=null;
  document.getElementById('sheetTitle').textContent='添加任务';
  document.getElementById('fTimeStart').value='';
  document.getElementById('fTimeEnd').value='';
  document.getElementById('fTitle').value='';
  document.getElementById('fDesc').value='';
  selectedColor='warm';
  selectedEmoji='☀️';
  renderColorPicker();
  renderEmojiPicker();
  showSheet('taskSheet');
}

let selectedColor='warm';
let selectedEmoji='☀️';

function renderColorPicker(){
  const el=document.getElementById('colorPicker');
  el.innerHTML=COLORS.map(c=>`<div class="color-opt${c.id===selectedColor?' selected':''}" style="background:${c.grad}" onclick="pickColor('${c.id}')"></div>`).join('');
}
function renderEmojiPicker(){
  const el=document.getElementById('emojiPicker');
  el.innerHTML=EMOJIS.map(e=>`<div class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="pickEmoji('${e}')">${e}</div>`).join('');
}
function pickColor(id){ selectedColor=id; renderColorPicker() }
function pickEmoji(e){ selectedEmoji=e; renderEmojiPicker() }

function saveTask(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){ document.getElementById('fTitle').focus(); return; }

  const task={
    id: state.editingId || uid(),
    timeStart: document.getElementById('fTimeStart').value,
    timeEnd: document.getElementById('fTimeEnd').value,
    title,
    desc: document.getElementById('fDesc').value.trim(),
    color: selectedColor,
    emoji: selectedEmoji,
    done: false,
  };

  let tasks=getTasks(state.currentDate);
  if(state.editingId){
    const idx=tasks.findIndex(t=>t.id===state.editingId);
    if(idx>=0){ task.done=tasks[idx].done; tasks[idx]=task; }
  } else {
    tasks.push(task);
  }

  setTasks(state.currentDate,tasks);
  closeSheet();
  render();
}

// ===== SHEETS =====
function showSheet(id){
  document.getElementById('overlay').classList.add('show');
  document.getElementById(id).classList.add('show');
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('taskSheet').classList.remove('show');
  document.getElementById('statsSheet').classList.remove('show');
}

function showStats(){
  const allDates=Object.keys(data.tasks);
  let totalTasks=0,totalDone=0,daysWithTasks=0;
  allDates.forEach(d=>{
    const t=data.tasks[d];
    if(t&&t.length){ daysWithTasks++; totalTasks+=t.length; totalDone+=t.filter(x=>x.done).length; }
  });
  const todayTasks=getTasks(todayStr());
  const todayPct=todayTasks.length>0?Math.round(todayTasks.filter(t=>t.done).length/todayTasks.length*100):0;

  document.getElementById('statToday').textContent=todayPct+'%';
  document.getElementById('statTotal').textContent=totalTasks;
  document.getElementById('statDone').textContent=totalDone;
  document.getElementById('statDays').textContent=daysWithTasks;
  showSheet('statsSheet');
}
function closeStats(){ closeSheet() }

// ===== SWIPE NAVIGATION =====
(function(){
  let sx=0,sy=0;
  const el=document.getElementById('taskList');
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*1.5){
      navDate(dx<0?1:-1);
    }
  },{passive:true});
})();

// ===== INIT =====
render();

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
