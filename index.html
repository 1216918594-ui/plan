<title>日程打卡</title>
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg1:#0f0c29;--bg2:#302b63;--bg3:#24243e;
  --card:rgba(255,255,255,0.04);--card-hover:rgba(255,255,255,0.07);
  --text:#e0e0e0;--text-dim:rgba(255,255,255,0.4);--text-faint:rgba(255,255,255,0.15);
  --green:#43e97b;--green2:#38f9d7;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html{
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  background-attachment:fixed;
  height:100%;overflow:hidden;
}
body{
  height:100%;overflow:hidden;
  font-family:'Noto Sans SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
#app{height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ===== HEADER ===== */
.header{
  padding:calc(var(--safe-top) + 12px) 20px 0;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.header .title-area{flex:1;text-align:center}
.header h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:1px}
.header .week{font-size:12px;color:var(--text-dim);margin-top:2px}
.header-btn{
  width:38px;height:38px;border-radius:50%;border:none;
  background:var(--card);color:var(--text);font-size:18px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background 0.2s;flex-shrink:0;
}
.header-btn:active{background:var(--card-hover)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sync-dot{
  width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.1);
  display:inline-block;margin-left:4px;vertical-align:middle;
  transition:background 0.3s;flex-shrink:0;
}
.sync-dot.syncing{background:#f5a623;animation:pulse 1s infinite}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:#ff5252}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ===== DATE STRIP ===== */
.date-strip{
  display:flex;gap:6px;padding:16px 20px 8px;overflow-x:auto;flex-shrink:0;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.date-strip::-webkit-scrollbar{display:none}
.date-item{
  min-width:48px;padding:8px 6px;border-radius:14px;text-align:center;
  cursor:pointer;transition:all 0.25s;flex-shrink:0;
  background:var(--card);
}
.date-item:active{transform:scale(0.95)}
.date-item .dow{font-size:10px;color:var(--text-dim);font-weight:500;letter-spacing:1px}
.date-item .day{font-size:18px;font-weight:700;color:rgba(255,255,255,0.6);margin:2px 0}
.date-item .dot-row{height:6px;display:flex;justify-content:center;align-items:center}
.date-item .done-dot{width:5px;height:5px;border-radius:50%;background:var(--green);opacity:0}
.date-item.active{background:rgba(67,233,123,0.15)}
.date-item.active .day{color:#fff}
.date-item.active .dow{color:var(--green)}
.date-item.has-tasks .done-dot{opacity:1}
.date-item.today .day{color:var(--green)}

/* ===== PROGRESS ===== */
.progress-section{padding:8px 24px 4px;flex-shrink:0}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:12px;color:var(--text-dim)}
.progress-label span{color:var(--green);font-weight:700;font-size:14px}
.progress-pct{font-size:12px;color:var(--text-dim);font-weight:500}
.progress-bar{width:100%;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:3px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}

/* ===== TASK LIST ===== */
.task-list{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 16px 100px;
  -webkit-overflow-scrolling:touch;
}
.category-label{
  display:flex;align-items:center;gap:8px;margin:20px 4px 10px;
}
.category-label:first-child{margin-top:8px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase}
.cat-line{flex:1;height:1px;background:rgba(255,255,255,0.06)}

/* Task Card */
.task-card{
  display:flex;align-items:stretch;margin-bottom:8px;border-radius:14px;
  background:var(--card);backdrop-filter:blur(10px);overflow:hidden;
  transition:all 0.3s;position:relative;
}
.task-card:active{transform:scale(0.98)}
.task-card.done{opacity:0.45}
.task-card.done .task-title{text-decoration:line-through;color:rgba(255,255,255,0.45)}

/* Accent bar */
.task-accent{width:3.5px;flex-shrink:0}

/* Checkbox */
.task-check{
  width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.check-ring{
  width:24px;height:24px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.check-ring svg{width:14px;height:14px;opacity:0;transform:scale(0.5);transition:all 0.25s}
.task-card.done .check-ring{border-color:var(--green);background:var(--green)}
.task-card.done .check-ring svg{opacity:1;transform:scale(1)}

/* Content */
.task-body{flex:1;padding:12px 12px 12px 0;display:flex;flex-direction:column;justify-content:center;min-width:0}
.task-title{font-size:15px;font-weight:500;color:#fff;transition:all 0.3s;line-height:1.3}
.task-time{font-size:11px;color:var(--text-dim);margin-bottom:3px;font-weight:500;letter-spacing:0.5px}
.task-desc{font-size:12px;color:var(--text-dim);margin-top:2px;line-height:1.4}
.task-emoji{
  width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:opacity 0.3s;position:relative;
}
.task-card.done .task-emoji{opacity:0.3}
.task-edit-btn{
  position:absolute;top:-6px;right:-6px;
  width:28px;height:28px;border-radius:50%;border:none;
  background:var(--card);color:var(--text-dim);font-size:13px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0.6;transition:opacity 0.2s;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.task-edit-btn:active{opacity:1}

.recur-badge{
  display:inline-block;font-size:10px;color:var(--text-dim);
  background:rgba(255,255,255,0.06);border-radius:6px;
  padding:1px 6px;margin-left:6px;vertical-align:middle;
}
.repeat-row{display:flex;gap:8px}
.repeat-opt{
  flex:1;padding:10px 0;border-radius:12px;border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);color:var(--text-dim);
  font-size:13px;font-weight:500;cursor:pointer;text-align:center;
  transition:all 0.2s;
}
.repeat-opt:active{transform:scale(0.97)}
.repeat-opt.selected{border-color:var(--green);color:var(--green);background:rgba(67,233,123,0.08)}

.diary-mood-row{display:flex;gap:8px;justify-content:center}
.diary-mood{
  width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);font-size:24px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;
}
.diary-mood:active{transform:scale(0.9)}
.diary-mood.selected{border-color:var(--green);background:rgba(67,233,123,0.12);transform:scale(1.15)}
.diary-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.diary-tag{
  padding:4px 12px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);color:var(--text-dim);
  font-size:12px;cursor:pointer;transition:all 0.2s;
}
.diary-tag.selected{border-color:var(--green);color:var(--green);background:rgba(67,233,123,0.08)}

.voice-mic{
  width:72px;height:72px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#f5576c,#f093fb);
  color:#fff;font-size:32px;margin:0 auto;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s;box-shadow:0 4px 20px rgba(245,87,108,0.3);
}
.voice-mic:active{transform:scale(0.9)}
.voice-mic.recording{background:linear-gradient(135deg,#ff3b3b,#ff6b6b);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,59,0.4)}50%{box-shadow:0 0 0 16px rgba(255,59,59,0)}}
.voice-transcript{
  width:100%;min-height:80px;padding:12px 16px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);
  color:var(--text);font-size:14px;line-height:1.6;resize:none;
  font-family:inherit;margin-top:12px;
}
.voice-preview{margin-top:16px}
.voice-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-radius:12px;background:var(--card);margin-bottom:8px;
}
.voice-item .vi-emoji{font-size:20px;flex-shrink:0}
.voice-item .vi-body{flex:1;min-width:0}
.voice-item .vi-time{font-size:11px;color:var(--text-dim)}
.voice-item .vi-title{font-size:14px;font-weight:500;color:#fff}
.voice-item.diary-type{border-left:3px solid #667eea}

/* Delete overlay */
.task-delete{
  position:absolute;right:0;top:0;bottom:0;width:70px;
  background:linear-gradient(90deg,transparent,rgba(245,87,108,0.9));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;font-weight:500;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}

/* ===== FLOATING BUTTONS ===== */
.fab-group{
  position:fixed;right:20px;z-index:50;
  display:flex;flex-direction:column;gap:12px;align-items:center;
  bottom:calc(var(--safe-bottom) + 24px);
}
.fab{
  width:56px;height:56px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:var(--bg1);font-size:28px;font-weight:400;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(67,233,123,0.3);
  cursor:pointer;transition:all 0.2s;
}
.fab:active{transform:scale(0.9)}
.fab-mini{
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:var(--text);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  cursor:pointer;transition:all 0.2s;
}
.fab-mini:active{transform:scale(0.9);background:rgba(255,255,255,0.12)}

/* ===== BOTTOM SHEET ===== */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.overlay.show{opacity:1;pointer-events:auto}

.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:101;
  background:linear-gradient(180deg,#1e1a3e,#16132e);
  border-radius:20px 20px 0 0;padding:0 20px calc(var(--safe-bottom) + 20px);
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  max-height:85vh;overflow-y:auto;
}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 16px}
.sheet h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:18px}

/* Form */
.form-row{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text-dim);font-weight:500;letter-spacing:1px;margin-bottom:6px;display:block}
.form-input{
  width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;background:rgba(255,255,255,0.04);
  color:#fff;font-size:15px;font-family:inherit;
  outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:rgba(67,233,123,0.4)}
.form-input::placeholder{color:rgba(255,255,255,0.2)}
textarea.form-input{resize:none;min-height:60px}

.form-time-row{display:flex;gap:10px;align-items:center}
.form-time-row input{flex:1;text-align:center}
.form-time-sep{color:var(--text-dim);font-size:14px}

/* Color picker */
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;
}
.color-opt:active{transform:scale(0.9)}
.color-opt.selected{border-color:#fff;transform:scale(1.1)}

/* Emoji picker */
.emoji-picker{display:flex;gap:6px;flex-wrap:wrap}
.emoji-opt{
  width:36px;height:36px;border-radius:10px;cursor:pointer;
  background:var(--card);display:flex;align-items:center;justify-content:center;
  font-size:18px;border:2px solid transparent;transition:all 0.2s;
}
.emoji-opt:active{transform:scale(0.9)}
.emoji-opt.selected{border-color:var(--green);background:rgba(67,233,123,0.1)}

/* Buttons */
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn{
  flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;
  font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.2s;
}
.btn:active{transform:scale(0.97)}
.btn-cancel{background:rgba(255,255,255,0.06);color:var(--text-dim)}
.btn-save{background:linear-gradient(135deg,var(--green),var(--green2));color:var(--bg1)}

/* ===== EMPTY STATE ===== */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 40px;text-align:center;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.6}
.empty-text{font-size:15px;color:var(--text-dim);line-height:1.6}
.empty-hint{font-size:12px;color:var(--text-faint);margin-top:8px}

/* ===== CELEBRATE ===== */
.celebrate-bar{
  position:fixed;top:calc(var(--safe-top) + 60px);left:20px;right:20px;
  padding:14px 20px;border-radius:14px;text-align:center;
  background:linear-gradient(135deg,rgba(67,233,123,0.2),rgba(56,249,215,0.15));
  border:1px solid rgba(67,233,123,0.2);
  font-size:15px;color:var(--green);font-weight:500;
  transform:translateY(-20px);opacity:0;transition:all 0.5s;
  pointer-events:none;z-index:40;
}
.celebrate-bar.show{transform:translateY(0);opacity:1}

/* ===== STATS SHEET ===== */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{
  padding:16px;border-radius:14px;background:var(--card);text-align:center;
}
.stat-num{font-size:28px;font-weight:700;color:#fff}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:4px;letter-spacing:1px}
.stat-num.green{color:var(--green)}

/* ===== SCROLLBAR ===== */
.task-list::-webkit-scrollbar{width:0}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.task-card{animation:fadeInUp 0.3s ease both}
.task-card:nth-child(2){animation-delay:0.03s}
.task-card:nth-child(3){animation-delay:0.06s}
.task-card:nth-child(4){animation-delay:0.09s}
.task-card:nth-child(5){animation-delay:0.12s}

@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.check-ring.just-checked{animation:pop 0.3s ease}

/* ===== COLOR THEMES ===== */
.c-warm .task-accent{background:linear-gradient(180deg,#f6d365,#fda085)}
.c-warm .task-time{color:#fda085}
.c-green .task-accent{background:linear-gradient(180deg,#a8e063,#56ab2f)}
.c-green .task-time{color:#a8e063}
.c-blue .task-accent{background:linear-gradient(180deg,#667eea,#764ba2)}
.c-blue .task-time{color:#9b8ec4}
.c-red .task-accent{background:linear-gradient(180deg,#f093fb,#f5576c)}
.c-red .task-time{color:#f093fb}
.c-teal .task-accent{background:linear-gradient(180deg,#43e97b,#38f9d7)}
.c-teal .task-time{color:#43e97b}
.c-orange .task-accent{background:linear-gradient(180deg,#fa709a,#fee140)}
.c-orange .task-time{color:#fa709a}
.c-purple .task-accent{background:linear-gradient(180deg,#a18cd1,#fbc2eb)}
.c-purple .task-time{color:#c4a8e0}
.c-night .task-accent{background:linear-gradient(180deg,#667eea,#2c3e7b)}
.c-night .task-time{color:#7b8ec8}
.c-cyan .task-accent{background:linear-gradient(180deg,#89f7fe,#66a6ff)}
.c-cyan .task-time{color:#89f7fe}
.c-peach .task-accent{background:linear-gradient(180deg,#ffecd2,#fcb69f)}
.c-peach .task-time{color:#fcb69f}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <button class="header-btn" onclick="navDate(-1)">‹</button>
    <div class="title-area">
      <h1 id="headerDate"></h1>
      <div class="week" id="headerWeek"></div>
    </div>
    <button class="header-btn" onclick="refreshApp()" title="更新">🔄</button>
    <span class="sync-dot" id="syncDot" title="云端备份"></span>
    <button class="header-btn" onclick="showStats()">📊</button>
  </div>

  <!-- Date Strip -->
  <div class="date-strip" id="dateStrip"></div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-info">
      <div class="progress-label">已完成 <span id="doneCount">0</span> / <span id="totalCount">0</span></div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- Task List -->
  <div class="task-list" id="taskList"></div>

  <!-- Floating Buttons -->
  <div class="fab-group">
    <button class="fab-mini" onclick="openVoice()" title="语音输入">🎙️</button>
    <button class="fab-mini" onclick="openDiary()" title="今日日记">📝</button>
    <button class="fab" onclick="openAdd()">+</button>
  </div>

  <!-- Celebrate -->
  <div class="celebrate-bar" id="celebrate">全部完成！今天超棒的 ✨</div>

</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- Add/Edit Sheet -->
<div class="sheet" id="taskSheet">
  <div class="sheet-handle"></div>
  <h2 id="sheetTitle">添加任务</h2>
  <div class="form-row">
    <label class="form-label">时间</label>
    <div class="form-time-row">
      <input class="form-input" type="time" id="fTimeStart">
      <span class="form-time-sep">—</span>
      <input class="form-input" type="time" id="fTimeEnd">
    </div>
  </div>
  <div class="form-row">
    <label class="form-label">标题</label>
    <input class="form-input" type="text" id="fTitle" placeholder="做什么？" maxlength="40">
  </div>
  <div class="form-row">
    <label class="form-label">描述（可选）</label>
    <textarea class="form-input" id="fDesc" placeholder="补充说明..." maxlength="100"></textarea>
  </div>
  <div class="form-row">
    <label class="form-label">分类颜色</label>
    <div class="color-picker" id="colorPicker"></div>
  </div>
  <div class="form-row">
    <label class="form-label">图标</label>
    <div class="emoji-picker" id="emojiPicker"></div>
  </div>
  <div class="form-row">
    <label class="form-label">重复</label>
    <div class="repeat-row">
      <div class="repeat-opt selected" id="repeatNone" onclick="pickRepeat('none')">不重复</div>
      <div class="repeat-opt" id="repeatDaily" onclick="pickRepeat('daily')">🔄 每天</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-cancel" onclick="closeSheet()">取消</button>
    <button class="btn btn-save" onclick="saveTask()">保存</button>
  </div>
</div>

<!-- Diary Sheet -->
<div class="sheet" id="diarySheet">
  <div class="sheet-handle"></div>
  <h2 id="diaryTitle">📝 今日日记</h2>
  <div class="form-row">
    <label class="form-label">今日心情</label>
    <div class="diary-mood-row" id="diaryMoodRow"></div>
  </div>
  <div class="form-row">
    <label class="form-label">今日反思</label>
    <textarea class="form-input" id="diaryText" placeholder="今天有什么感悟？" maxlength="500" style="min-height:120px"></textarea>
  </div>
  <div class="form-row">
    <label class="form-label">标签</label>
    <input class="form-input" type="text" id="diaryTagInput" placeholder="输入标签后回车添加" maxlength="20" style="margin-bottom:8px">
    <div class="diary-tags" id="diaryTags"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-cancel" onclick="closeSheet()">取消</button>
    <button class="btn btn-save" onclick="saveDiaryUI()">保存</button>
  </div>
</div>

<!-- Voice Sheet -->
<div class="sheet" id="voiceSheet">
  <div class="sheet-handle"></div>
  <h2>🎙️ 语音输入</h2>
  <div style="text-align:center;margin:16px 0">
    <button class="voice-mic" id="voiceMic" onclick="toggleVoice()">🎤</button>
    <div style="font-size:12px;color:var(--text-dim);margin-top:8px" id="voiceStatus">点击开始说话</div>
  </div>
  <textarea class="voice-transcript" id="voiceTranscript" placeholder="识别结果会显示在这里，也可以手动编辑..." readonly></textarea>
  <div class="voice-preview" id="voicePreview"></div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn btn-cancel" onclick="closeSheet()">取消</button>
    <button class="btn btn-save" id="voiceSaveBtn" onclick="saveVoice()" disabled style="opacity:0.5">保存</button>
  </div>
</div>

<!-- Stats Sheet -->
<div class="sheet" id="statsSheet">
  <div class="sheet-handle"></div>
  <h2>数据统计</h2>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num green" id="statToday">0%</div><div class="stat-label">今日完成率</div></div>
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">累计任务数</div></div>
    <div class="stat-card"><div class="stat-num green" id="statDone">0</div><div class="stat-label">累计完成</div></div>
    <div class="stat-card"><div class="stat-num" id="statDays">0</div><div class="stat-label">打卡天数</div></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-save" onclick="closeStats()" style="background:var(--card);color:var(--text)">关闭</button>
  </div>
</div>

<script>
// ===== CONSTANTS =====
const COLORS = [
  {id:'warm',grad:'linear-gradient(135deg,#f6d365,#fda085)'},
  {id:'green',grad:'linear-gradient(135deg,#a8e063,#56ab2f)'},
  {id:'blue',grad:'linear-gradient(135deg,#667eea,#764ba2)'},
  {id:'red',grad:'linear-gradient(135deg,#f093fb,#f5576c)'},
  {id:'teal',grad:'linear-gradient(135deg,#43e97b,#38f9d7)'},
  {id:'orange',grad:'linear-gradient(135deg,#fa709a,#fee140)'},
  {id:'purple',grad:'linear-gradient(135deg,#a18cd1,#fbc2eb)'},
  {id:'night',grad:'linear-gradient(135deg,#667eea,#2c3e7b)'},
  {id:'cyan',grad:'linear-gradient(135deg,#89f7fe,#66a6ff)'},
  {id:'peach',grad:'linear-gradient(135deg,#ffecd2,#fcb69f)'},
];
const EMOJIS = ['☀️','🏃','📐','📊','📈','📖','💪','🍲','🥗','😴','🎮','🌙','📦','🎵','✍️','💻','🧘','🛒','📝','🎨'];
const DOW = ['日','一','二','三','四','五','六'];
const STORAGE_KEY = 'daily_planner_data';

// ===== STATE =====
let state = { currentDate: todayStr(), editingId: null, editingRecurringId: null };
let data = loadData();

// ===== UTILS =====
function todayStr(){ return fmtDate(new Date()) }
function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0') }
function parseDate(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]) }
function dateLabel(s){
  const d=parseDate(s), t=parseDate(todayStr());
  const diff=Math.round((d-t)/(86400000));
  if(diff===0) return '今天';
  if(diff===1) return '明天';
  if(diff===-1) return '昨天';
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}
function fullDateLabel(s){
  const d=parseDate(s);
  return d.getFullYear()+' 年 '+(d.getMonth()+1)+' 月 '+d.getDate()+' 日';
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }

// ===== STORAGE =====
function loadData(){
  try{
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {tasks:{},dataVersion:0};
    if(!d.recurring) d.recurring=[];
    if(!d.doneLog) d.doneLog={};
    if(!d.diary) d.diary={};
    return d;
  }
  catch(e){ return {tasks:{},recurring:[],doneLog:{},diary:{}} }
}
function saveData(){
  try{
    data.dataVersion = (data.dataVersion||0)+1;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    scheduleBackup();
  }catch(e){}
}
function getTasks(date){
  return (data.tasks[date]||[]).sort((a,b)=>(a.timeStart||'').localeCompare(b.timeStart||''));
}
function setTasks(date,tasks){
  if(tasks.length===0) delete data.tasks[date];
  else data.tasks[date]=tasks;
  saveData();
}

// ===== RECURRING TASKS =====
function getRecurringTasks(date){
  if(!data.recurring||data.recurring.length===0) return [];
  const log=data.doneLog[date]||{};
  return data.recurring.map(r=>({
    ...r, id:'r_'+r.id, _recurringId:r.id,
    done: !!log['r_'+r.id],
    _isRecurring: true
  }));
}
function getAllTasks(date){
  const oneTime=getTasks(date);
  const recurring=getRecurringTasks(date);
  const all=[...oneTime,...recurring];
  return all.sort((a,b)=>(a.timeStart||'99').localeCompare(b.timeStart||'99'));
}
function toggleRecurring(recurringId,date){
  if(!data.doneLog[date]) data.doneLog[date]={};
  const key='r_'+recurringId;
  data.doneLog[date][key]=!data.doneLog[date][key];
  saveData();
}
function addRecurring(task){
  task.id=uid();
  data.recurring.push(task);
  saveData();
}
function removeRecurring(recurringId){
  data.recurring=data.recurring.filter(r=>r.id!==recurringId);
  // Clean doneLog
  Object.keys(data.doneLog).forEach(d=>{
    delete data.doneLog[d]['r_'+recurringId];
  });
  saveData();
}

// ===== DIARY =====
function getDiary(date){
  return data.diary[date]||null;
}
function saveDiary(date,entry){
  if(!entry.text&&!entry.mood) { delete data.diary[date]; }
  else { data.diary[date]=entry; }
  saveData();
}
function getAllTags(){
  const tagSet=new Set();
  Object.values(data.diary).forEach(d=>{
    if(d.tags) d.tags.forEach(t=>tagSet.add(t));
  });
  return [...tagSet].sort();
}

// ===== RENDER =====
function render(){
  renderHeader();
  renderDateStrip();
  renderTasks();
  renderProgress();
}

function renderHeader(){
  const el=document.getElementById('headerDate');
  const wk=document.getElementById('headerWeek');
  el.textContent=fullDateLabel(state.currentDate);
  const d=parseDate(state.currentDate);
  wk.textContent='星期'+DOW[d.getDay()];
}

function renderDateStrip(){
  const strip=document.getElementById('dateStrip');
  const today=new Date();
  let html='';
  for(let i=-7;i<=7;i++){
    const d=new Date(today);d.setDate(d.getDate()+i);
    const ds=fmtDate(d);
    const tasks=getAllTasks(ds);
    const done=tasks.filter(t=>t.done).length;
    const isActive=ds===state.currentDate;
    const isToday=ds===todayStr();
    const hasTasks=tasks.length>0;
    const allDone=hasTasks&&done===tasks.length;
    const hasDiary=!!data.diary[ds];
    html+=`<div class="date-item${isActive?' active':''}${isToday?' today':''}${hasTasks?' has-tasks':''}" onclick="goToDate('${ds}')">
      <div class="dow">${DOW[d.getDay()]}${hasDiary?' 📝':''}</div>
      <div class="day">${d.getDate()}</div>
      <div class="dot-row"><div class="done-dot" style="${allDone?'opacity:1':''}"></div></div>
    </div>`;
  }
  strip.innerHTML=html;
  setTimeout(()=>{
    const active=strip.querySelector('.active');
    if(active) active.scrollIntoView({inline:'center',behavior:'smooth'});
  },50);
}

function renderTasks(){
  const list=document.getElementById('taskList');
  const tasks=getAllTasks(state.currentDate);

  if(tasks.length===0){
    list.innerHTML=`<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">${state.currentDate===todayStr()?'今天还没有安排':'这天还没有安排'}</div>
      <div class="empty-hint">点右下角 + 添加任务</div>
    </div>`;
    return;
  }

  // Group by category color
  let html='';
  let lastColor='';
  const colorNames={warm:'晨间',green:'运动',blue:'学习',red:'重点',teal:'生活',orange:'活力',purple:'深度',night:'晚间',cyan:'休息',peach:'轻松'};

  tasks.forEach((task,i)=>{
    if(task.color!==lastColor){
      lastColor=task.color;
      const cn=colorNames[task.color]||'其他';
      const c=COLORS.find(x=>x.id===task.color);
      html+=`<div class="category-label">
        <div class="cat-dot" style="background:${c?c.grad:'#888'}"></div>
        <span class="cat-name" style="color:${c?'rgba(255,255,255,0.5)':'#888'}">${cn}</span>

    }
    const timeStr=(task.timeStart||'')+(task.timeEnd?' — '+task.timeEnd:'');
    const recurBadge=task._isRecurring?'<span class="recur-badge">🔄每天</span>':'';
    const editAction=task._isRecurring
      ? `event.stopPropagation();editRecurring('${task._recurringId}')`
      : `event.stopPropagation();openEdit('${task.id}')`;
    html+=`<div class="task-card c-${task.color}${task.done?' done':''}" data-id="${task.id}" onclick="toggleTask('${task.id}')">
      <div class="task-check"><div class="check-ring"><svg viewBox="0 0 24 24" fill="none" stroke="#0f0c29" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div></div>
      <div class="task-accent"></div>

        ${timeStr?'<div class="task-time">'+timeStr+'</div>':''}
        <div class="task-title">${esc(task.title)} ${recurBadge}</div>
        ${task.desc?'<div class="task-desc">'+esc(task.desc)+'</div>':''}
      </div>
      <div class="task-emoji">${task.emoji||''}<button class="task-edit-btn" onclick="${editAction}">✏️</button></div>
    </div>`;
  });

  list.innerHTML=html;

  // Long press to delete
  list.querySelectorAll('.task-card').forEach(card=>{
    let timer;
    card.addEventListener('touchstart',e=>{
      if(e.target.closest('.task-edit-btn')) return;
      timer=setTimeout(()=>{
        const id=card.dataset.id;
        const msg=id.startsWith('r_')?'删除这个每天重复的任务？':'删除这个任务？';
        if(confirm(msg)) deleteTask(id);
      },600);
    },{passive:true});
    card.addEventListener('touchend',()=>clearTimeout(timer));
    card.addEventListener('touchmove',()=>clearTimeout(timer));
  });
}

  if(id.startsWith('r_')){
    removeRecurring(id.slice(2));
    render();

  let tasks=getTasks(state.currentDate);
  tasks=tasks.filter(t=>t.id!==id);

function saveTask(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){ document.getElementById('fTitle').focus(); return; }

  const taskData={
    title,
    timeStart: document.getElementById('fTimeStart').value,
    timeEnd: document.getElementById('fTimeEnd').value,
    desc: document.getElementById('fDesc').value.trim(),
    color: selectedColor,
    emoji: selectedEmoji,
  };

  // Edit recurring task
  if(state.editingRecurringId){
    const idx=data.recurring.findIndex(r=>r.id===state.editingRecurringId);
    if(idx>=0){
      Object.assign(data.recurring[idx], taskData);
      saveData();
    }
    closeSheet(); render(); return;
  }

  // New task with repeat → add to recurring
  if(!state.editingId && selectedRepeat==='daily'){
    addRecurring(taskData);
    closeSheet(); render(); return;
  }

  // One-time task (add or edit)
  const task={
    id: state.editingId || uid(),
    ...taskData,
    done: false,
  };

  let tasks=getTasks(state.currentDate);
  if(state.editingId){
    const idx=tasks.findIndex(t=>t.id===state.editingId);
    if(idx>=0){ task.done=tasks[idx].done; tasks[idx]=task; }
  } else {
    tasks.push(task);
  }

  setTasks(state.currentDate,tasks);
  closeSheet();
  render();
}

// ===== CLOUD SYNC =====
async function cloudSync(){
  try{
    const resp = await fetch('schedule.json?t='+Date.now(), {cache:'no-store'});
    if(!resp.ok) return;
    const schedule = await resp.json();
    if(!schedule || !schedule.pending) return;
    const sv = schedule.syncVersion || 0;
    const last = data.lastSyncVersion || 0;
    if(sv <= last) return; // No new data
    // Import pending entries
    const pending = schedule.pending;
    Object.keys(pending).forEach(date => {
      const entry = pending[date];
      // Merge tasks (dedup by title+time, not just ID)
      if(entry.tasks && entry.tasks.length > 0){
        const existing = data.tasks[date] || [];
        entry.tasks.forEach(t => {
          if(!t.id) t.id = uid();
          const isDup = existing.some(e =>
            e.title === t.title && (e.timeStart||'') === (t.timeStart||'')
          );
          if(!isDup){
            t.done = false;
            existing.push(t);
          }
        });
        data.tasks[date] = existing;
      }
      // Merge diary (always overwrite from sync)
      if(entry.diary && (entry.diary.text || entry.diary.mood)){
        data.diary[date] = entry.diary;
      }
    });
    data.lastSyncVersion = sv;
    saveData();
    // If pending has today's date, navigate to it
    if(pending[todayStr()]) state.currentDate = todayStr();
    render();
  }catch(e){ /* silent */ }
}

const GH_TOKEN = String.fromCharCode(103,105,116,104,117,98,95,112,97,116,95,49,49,67,71,77,89,85,90,81,48,65,48,88,118,111,111,70,79,98,73,101,50,95,74,108,108,50,107,88,88,109,86,54,79,101,70,72,48,122,66,114,57,52,51,70,113,102,120,69,112,48,110,113,49,102,111,70,97,107,100,111,118,84,76,48,104,75,78,52,85,65,52,73,65,108,66,104,78,100,99,83,85);
const GH_OWNER = '1216918594-ui';
const GH_REPO = 'plan';
const GH_BACKUP = 'data-backup.json';
let backupTimer = null;

function setSyncDot(cls){
  const d = document.getElementById('syncDot');
  if(!d) return;
  d.className = 'sync-dot' + (cls ? ' '+cls : '');
}

async function cloudBackup(){
  if(!data || Object.keys(data.tasks||{}).length === 0 && !data.diary) return;
  try{
    setSyncDot('syncing');
    // Read current backup from GitHub
    const rResp = await fetch(
      'https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_BACKUP,
      {headers:{'Authorization':'token '+GH_TOKEN}}
    );
    let sha = null, cloudVersion = 0, cloudData = null;
    if(rResp.ok){
      const info = await rResp.json();
      sha = info.sha;
      cloudData = JSON.parse(atob(info.content));
      cloudVersion = cloudData.dataVersion || 0;
    }
    const localVersion = data.dataVersion || 0;
    // If cloud has newer data and local is stale, merge/restore
    if(cloudData && cloudVersion > localVersion && localVersion === 0){
      // Fresh device — restore from cloud
      ['tasks','recurring','doneLog','diary','lastSyncVersion'].forEach(k => {
        if(cloudData[k] !== undefined) data[k] = cloudData[k];
      });
      data.dataVersion = cloudVersion;
      saveData();
      render();
      setSyncDot('ok');
      return;
    }
    // If local has changes, upload
    if(localVersion <= cloudVersion && cloudData) { setSyncDot('ok'); return; }
    const body = {
      message:'auto: backup data v'+localVersion,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(data)))),
    };
    if(sha) body.sha = sha;
    const pResp = await fetch(
      'https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_BACKUP,
      {method:'PUT',headers:{'Authorization':'token '+GH_TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)}
    );
    if(pResp.ok) setSyncDot('ok'); else setSyncDot('err');
  }catch(e){ setSyncDot('err'); }
}

function scheduleBackup(){
  if(backupTimer) clearTimeout(backupTimer);
  backupTimer = setTimeout(cloudBackup, 3000);
}

function toggleVoice(){
  if(voiceRecognition){
    voiceRecognition.stop();
    voiceRecognition = null;
    document.getElementById('voiceMic').classList.remove('recording');
    document.getElementById('voiceStatus').textContent = '点击开始说话';
    document.getElementById('voiceTranscript').readOnly = false;
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  voiceRecognition = new SR();
  voiceRecognition.lang = 'zh-CN';
  voiceRecognition.continuous = true;
  voiceRecognition.interimResults = true;
  let finalText = '';

  voiceRecognition.onresult = function(e){
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText += t;
      else interim += t;
    }
    document.getElementById('voiceTranscript').value = finalText + interim;
  };

  voiceRecognition.onerror = function(e){
    console.warn('Voice error', e.error);
    if(e.error === 'not-allowed'){
      document.getElementById('voiceStatus').textContent = '⚠️ 请允许麦克风权限';
    } else if(e.error !== 'no-speech'){
      document.getElementById('voiceStatus').textContent = '识别出错，请重试';
    }
  };

  voiceRecognition.onend = function(){
    document.getElementById('voiceMic').classList.remove('recording');
    document.getElementById('voiceStatus').textContent = '点击开始说话';
    document.getElementById('voiceTranscript').readOnly = false;
    voiceRecognition = null;
    // Auto-parse when done
    const text = document.getElementById('voiceTranscript').value.trim();
    if(text){
      voiceParsed = parseVoiceText(text);
      renderVoicePreview();
    }
  };

  voiceRecognition.start();
  document.getElementById('voiceMic').classList.add('recording');
  document.getElementById('voiceStatus').textContent = '正在聆听…再点一下停止';
}

function parseVoiceText(text){
  const items = [];
  // Split by Chinese punctuation and conjunctions
  const segments = text.split(/[，,。！？；\n]|然后|接着|之后|还有|另外/g).map(s=>s.trim()).filter(s=>s.length>1);

  const diaryKeywords = ['心情','感觉','反思','觉得','感悟','开心','不开心','难过','收获'];
  const colorMap = [
    {keywords:['运动','跑步','健身','游泳','锻炼','瑜伽','打球','球'], color:'green', emoji:'💪'},
    {keywords:['看书','学习','论文','读书','研究','阅读','研讨'], color:'blue', emoji:'📖'},
    {keywords:['吃饭','早餐','午餐','晚餐','做饭','吃'], color:'warm', emoji:'🍲'},
    {keywords:['编程','代码','工作','codex','agent','开发','写程序'], color:'purple', emoji:'💻'},
    {keywords:['睡觉','休息','闭目','午休','午睡','躺'], color:'cyan', emoji:'😴'},
    {keywords:['剪辑','视频','拍摄','拍照','vlog'], color:'red', emoji:'🎬'},
    {keywords:['应酬','聚会','吃饭局','social'], color:'orange', emoji:'🍻'},
    {keywords:['背英语','英语','单词','背单词'], color:'teal', emoji:'🔤'},
  ];

  segments.forEach(seg => {
    // Detect diary type
    const isDiary = diaryKeywords.some(k => seg.includes(k));

    // Extract time: patterns like "X点到Y点", "X点半", "下午X点"
    let timeStart = '', timeEnd = '';
    // Full range: "8点到9点", "下午两点到三点半"
    const timeRange = seg.match(/(下午|上午|早上|晚上)?(\d{1,2})[点:.](\d{0,2}|半)\s*[到至~\-]\s*(下午|上午|晚上)?(\d{1,2})[点:.](\d{0,2}|半)?/);
    if(timeRange){
      let h1 = parseInt(timeRange[2]);
      let m1 = timeRange[3]==='半' ? 30 : (parseInt(timeRange[3])||0);
      let h2 = parseInt(timeRange[5]);
      let m2 = (timeRange[6]==='半') ? 30 : (parseInt(timeRange[6])||0);
      // Apply period prefix
      const p1 = timeRange[1]||'';
      if((p1.includes('下午')||p1.includes('晚上')) && h1<12) h1+=12;
      if((p1.includes('上午')||p1.includes('早上')) && h1===12) h1=0;
      const p2 = timeRange[4]||p1;
      if((p2.includes('下午')||p2.includes('晚上')) && h2<12) h2+=12;
      if((p2.includes('上午')||p2.includes('早上')) && h2===12) h2=0;
      timeStart = String(h1).padStart(2,'0')+':'+String(m1).padStart(2,'0');
      timeEnd = String(h2).padStart(2,'0')+':'+String(m2).padStart(2,'0');
    } else {
      // Single time: "8点", "下午3点", "3点半"
      const singleTime = seg.match(/(下午|上午|早上|晚上)?(\d{1,2})[点:.](\d{0,2}|半)/);
      if(singleTime){
        let h = parseInt(singleTime[2]);
        let m = singleTime[3]==='半' ? 30 : (parseInt(singleTime[3])||0);
        const p = singleTime[1]||'';
        if((p.includes('下午')||p.includes('晚上')) && h<12) h+=12;
        if((p.includes('上午')||p.includes('早上')) && h===12) h=0;
        timeStart = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
      }
    }

    // Detect color/emoji
    let color = 'warm', emoji = '📋';
    for(const cm of colorMap){
      if(cm.keywords.some(k => seg.toLowerCase().includes(k.toLowerCase()))){
        color = cm.color; emoji = cm.emoji; break;
      }
    }

    // Clean title: remove time portion
    let title = seg.replace(/(下午|上午|早上|晚上)?\d{1,2}[点:.]\d{0,2}(半)?\s*[到至~\-]\s*(下午|上午|晚上)?\d{1,2}[点:.]\d{0,2}(半)?/g,'')
      .replace(/(下午|上午|早上|晚上)?\d{1,2}[点:.]\d{0,2}(半)?/g,'')
      .replace(/^[，,、\s]+/,'').trim();
    if(!title) title = seg;
    if(title.length > 30) title = title.slice(0,30);

    if(isDiary){
      items.push({type:'diary', text: seg, mood: 0, tags: []});
    } else {
      items.push({type:'task', title, timeStart, timeEnd, color, emoji, desc:''});
    }
  });

  return items;
}

function renderVoicePreview(){
  const el = document.getElementById('voicePreview');
  const saveBtn = document.getElementById('voiceSaveBtn');
  if(voiceParsed.length === 0){
    el.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:13px;padding:12px">未识别到有效内容</div>';
    saveBtn.disabled = true; saveBtn.style.opacity = '0.5';
    return;
  }
  el.innerHTML = voiceParsed.map((item,i) => {
    if(item.type === 'diary'){
      return '<div class="voice-item diary-type"><div class="vi-emoji">📝</div><div class="vi-body"><div class="vi-title">日记</div><div class="vi-time">'+esc(item.text)+'</div></div></div>';
    }
    const time = item.timeStart ? item.timeStart+(item.timeEnd?' — '+item.timeEnd:'') : '弹性';
    return '<div class="voice-item"><div class="vi-emoji">'+item.emoji+'</div><div class="vi-body"><div class="vi-time">'+time+'</div><div class="vi-title">'+esc(item.title)+'</div></div></div>';
  }).join('');
  saveBtn.disabled = false; saveBtn.style.opacity = '1';
}

function saveVoice(){
  if(voiceParsed.length === 0) return;
  const date = state.currentDate;
  voiceParsed.forEach(item => {
    if(item.type === 'task'){
      const existing = data.tasks[date] || [];
      existing.push({
        id: uid(), title: item.title,
        timeStart: item.timeStart, timeEnd: item.timeEnd,
        color: item.color, emoji: item.emoji, desc: item.desc, done: false
      });
      data.tasks[date] = existing;
    } else if(item.type === 'diary'){
      const existing = data.diary[date] || {};
      data.diary[date] = {
        mood: item.mood || existing.mood || 0,
        text: item.text + (existing.text ? '\n'+existing.text : ''),
        tags: [...new Set([...(item.tags||[]),...(existing.tags||[])])]
      };
    }
  });
  saveData();
  closeSheet();
  render();
}

// ===== REFRESH =====
async function refreshApp(){
  const btn = document.querySelector('.header-btn[onclick*="refreshApp"]');
  if(btn) btn.style.animation = 'spin 0.5s linear';
  try{
    // Unregister service worker
    if('serviceWorker' in navigator){
      const reg = await navigator.serviceWorker.getRegistration();
      if(reg) await reg.unregister();
    }
    // Clear all caches
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
    // Hard reload
    window.location.reload(true);
  }catch(e){
    window.location.reload(true);
  }
}

// ===== DEDUP CLEANUP =====
function dedupCleanup(){
  let changed = false;
  Object.keys(data.tasks).forEach(date => {
    const tasks = data.tasks[date];
    if(!tasks || tasks.length < 2) return;
    const seen = new Set();
    const clean = [];
    tasks.forEach(t => {
      const key = t.title + '|' + (t.timeStart||'');
      if(!seen.has(key)){ seen.add(key); clean.push(t); }
      else { changed = true; }
    });
    if(clean.length !== tasks.length){
      if(clean.length === 0) delete data.tasks[date];
      else data.tasks[date] = clean;
    }
  });
  if(changed) saveData();
}

// ===== INIT =====
preseedRecurring();
dedupCleanup();
render();
// Defer network calls to avoid blocking first paint
setTimeout(()=>{ cloudSync(); cloudBackup(); }, 1500);

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
